<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShelf</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sideMenu" class="side-menu">
        <button id="closeMenuBtn" class="close-btn">&times;</button>
        <h3>Settings</h3>
        
        <div class="menu-section">
            <h4>Theme</h4>
            <select id="themeSelect">
                <option value="light">Light Mode</option>
                <option value="dark">Dark Mode</option>
            </select>
        </div>

        <div class="menu-section">
            <h4>Add Custom Genre</h4>
            <input type="text" id="newGenreName" placeholder="Genre Name (e.g. K-Pop)">
            <select id="newGenreCategory">
                <option value="movie">For Movies</option>
                <option value="song">For Songs</option>
                <option value="book">For Books</option>
            </select>
            <button id="saveGenreBtn" class="save-btn">Add Genre</button>
        </div>
    </div>

    <div id="menuOverlay" class="menu-overlay"></div>

    <div class="container">
        <header>
            <div class="top-row">
                <button id="menuBtn" class="icon-btn menu-icon">☰</button>
                <div class="title-group">
                    <img src="icon.png" alt="App Icon" class="app-icon">
                    <h1 class="app-title">MyShelf</h1>
                </div>
            </div>
            <div class="bottom-row">
                <button id="homeBtn" class="icon-btn home-text-btn" title="Home">🏠 Home</button>
            </div>
        </header>

        <div id="homeView" class="view active">
            <div class="menu-grid">
                <button id="navMovie" class="menu-card">🎬<br>Movies</button>
                <button id="navSong" class="menu-card">🎵<br>Songs</button>
                <button id="navBook" class="menu-card">📚<br>Books</button>
            </div>
        </div>

        <div id="movieView" class="view">
            <h2>Add a Movie</h2>
            <div class="input-form">
                <input type="text" id="movieTitle" placeholder="Movie Title">
                <input type="number" id="movieYear" placeholder="Release Year">
                <select id="movieGenre" class="dynamic-genre">
                    <option value="" disabled selected>Select Genre</option>
                    </select>
                <select id="movieStatus">
                    <option value="to_watch">To Be Watched</option>
                    <option value="watched">Watched</option>
                </select>
                <div class="row-inputs">
                    <div class="input-group">
                        <label for="movieDate" class="input-label">Watched Date:</label>
                        <input type="date" id="movieDate">
                    </div>
                    <select id="movieRating" class="rating-dropdown">
                        <option value="" disabled selected>Rating</option>
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>
                <button id="saveMovieBtn" class="save-btn">Save to Firebase</button>
            </div>
            <div class="list-container">
                <h3>Your Movies</h3>
                <ul id="movieList"></ul>
            </div>
        </div>

        <div id="songView" class="view">
            <h2>Add a Song</h2>
            <div class="input-form">
                <input type="text" id="songTitle" placeholder="Song Title">
                <input type="text" id="songSinger" placeholder="Singer/Artist">
                <div class="row-inputs">
                    <select id="songGenre" class="dynamic-genre genre-dropdown">
                        <option value="" disabled selected>Select Genre</option>
                        </select>
                    <select id="songRating" class="rating-dropdown">
                        <option value="" disabled selected>Rating</option>
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>
                <button id="saveSongBtn" class="save-btn">Save to Firebase</button>
            </div>
            <div class="list-container">
                <h3>Your Songs</h3>
                <ul id="songList"></ul>
            </div>
        </div>

        <div id="bookView" class="view">
            <h2>Add a Book</h2>
            <div class="input-form">
                <input type="text" id="bookName" placeholder="Book Name">
                <input type="text" id="bookAuthor" placeholder="Author">
                <input type="number" id="bookYear" placeholder="Publish Year">
                <select id="bookGenre" class="dynamic-genre">
                    <option value="" disabled selected>Select Genre</option>
                    </select>
                <div class="row-inputs">
                    <div class="input-group">
                        <label for="bookDate" class="input-label">Read Date:</label>
                        <input type="date" id="bookDate">
                    </div>
                    <select id="bookRating" class="rating-dropdown">
                        <option value="" disabled selected>Rating</option>
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>
                <button id="saveBookBtn" class="save-btn">Save to Firebase</button>
            </div>
            <div class="list-container">
                <h3>Your Books</h3>
                <ul id="bookList"></ul>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
