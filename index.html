<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShelf | Movie Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body data-theme="dark-knight">

  <div id="login-wrapper">
    <h1 class="login-title">MyShelf</h1>
    <div class="login-form">
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-password" placeholder="Password">
      <button id="login-btn">Login</button>
    </div>
  </div>

  <div id="app-wrapper" class="hidden">
    <div id="sidebar" class="sidebar">
      <button id="close-sidebar" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
      <h2>Settings</h2>
      
      <div class="sidebar-section">
        <label for="theme-select">Theme</label>
        <select id="theme-select">
          <option value="dark-knight">🦇 Dark Knight</option>
          <option value="spider-man">🕷️ Spider-Man</option>
          <option value="mad-max">🏜️ Mad Max: Fury Road</option>
          <option value="grand-budapest">🏨 The Grand Budapest Hotel</option>
          <option value="moonlight">🌊 Moonlight</option>
          <option value="matrix">💻 The Matrix</option>
          <option value="blade-runner">🏎️ Blade Runner 2049</option>
          <option value="interstellar">🌌 Interstellar</option>
          <option value="joker">🤡 Joker (2019)</option>
          <option value="dune">🏜️ Dune</option>
        </select>
      </div>

      <div class="sidebar-section">
        <h3>Customize Movie Properties</h3>
        <label for="customize-prop-select">Select Property</label>
        <select id="customize-prop-select">
          <option value="Property">Property (Add New)</option>
        </select>
        
        <label for="customize-tag-input">Tag / String Input</label>
        <input type="text" id="customize-tag-input" placeholder="Enter new property or tag">
        
        <button id="add-custom-btn" class="btn">Add</button>
      </div>

      <div class="sidebar-section">
        <button id="db-view-btn" class="btn btn-outline">Database View</button>
      </div>
    </div>

    <div id="main-content">
      <header>
        <div class="header-left">
          <button id="open-sidebar" class="icon-btn"><i class="fa-solid fa-bars"></i></button>
          <h1>MyShelf</h1>
        </div>
        <button id="logout-btn" class="icon-btn" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
      </header>

      <div class="container">
        <section class="panel input-panel">
          <div class="form-group">
            <label for="movie-name">Title</label>
            <input type="text" id="movie-name" placeholder="Enter title...">
          </div>
          
          <div class="dynamic-grid">
            <div class="form-group">
              <label for="add-prop-select">Properties</label>
              <select id="add-prop-select">
                <option value="">Select Property</option>
                </select>
            </div>
            <div class="form-group">
              <label for="add-tag-select">Sub Properties</label>
              <select id="add-tag-select" disabled>
                <option value="">Select Value</option>
                </select>
            </div>
          </div>

          <div class="form-group full-width">
            <label for="movie-notes">Notes (Review/Info)</label>
            <textarea id="movie-notes" rows="3" placeholder="Write your review or notes here..."></textarea>
          </div>

          <button id="save-movie-btn" class="btn btn-primary">Save Movie</button>
        </section>

        <section id="database-panel" class="panel database-panel hidden">
          <h2>Database</h2>
          
          <div class="filter-bar">
            <div class="filter-group">
              <label for="filter-by-select">Filter by:</label>
              <select id="filter-by-select">
                <option value="">Select Filter</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="filter-tag-select">Tag:</label>
              <select id="filter-tag-select" disabled>
                <option value="">Select Tag</option>
              </select>
            </div>
          </div>

          <div class="table-wrapper">
            <table id="movie-table">
              <thead id="table-head">
              </thead>
              <tbody id="table-body">
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
