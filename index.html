<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShelf</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sideMenu" class="side-menu">
        <button id="closeMenuBtn" class="close-btn">&times;</button>
        
        <div class="menu-section">
            <h4>Theme</h4>
            <select id="themeSelect">
                <option value="light">Light Mode</option>
                <option value="dark">Dark Mode</option>
            </select>
        </div>
        
        <div class="menu-section">
            <h4>Customize</h4>
            <select id="customType" style="margin-bottom: 8px;">
                <option value="Language">Language</option>
                <option value="movieGenre">Movie Genre</option>
                <option value="songGenre">Song Genre</option>
                <option value="bookGenre">Book Genre</option>
                <option value="Artist">Artist</option>
                <option value="Author">Author</option>
            </select>
            <input type="text" id="customValue" placeholder="Enter the String">
            <button id="saveCustomBtn" class="save-custom-btn" style="margin-top: 8px;">Add to List</button>
        </div>
        
        <div class="menu-section">
            <h4>Database Update</h4>
            <div style="display: flex; gap: 10px; width: 100%;">
                <button id="toggleTempBtn" class="save-custom-btn" style="background:#ff9800; flex: 1; margin: 0; text-align: center; padding: 10px 5px;">Commits</button>
                <button id="mergeBtn" class="save-custom-btn" style="background:#28a745; flex: 1; margin: 0; text-align: center; padding: 10px 5px;">Merge</button>
            </div>
        </div>

        <div class="menu-section" id="permActionsSection">
            <h4>Permanent Database</h4>
            <button id="clearVisibleBtn" class="save-custom-btn" style="background:#dc3545; width: 100%; text-align: center;">Clear Visible Entries</button>
        </div>
    </div>

    <div id="menuOverlay" class="menu-overlay"></div>

    <div class="container">
        <header>
            <div class="header-top">
                <div class="title-group">
                    <img src="icon.png" alt="App Icon" class="app-icon">
                    <h1 class="app-title">MyShelf</h1>
                </div>
            </div>
            <div class="header-bottom">
                <button id="menuBtn" class="icon-btn menu-icon">☰</button>
                <button id="homeBtn" class="icon-btn home-text-btn" title="Home">🏠</button>
            </div>
        </header>

        <div id="homeView" class="view active">
            <div class="menu-grid" style="flex-wrap: wrap;">
                <button id="navMovie" class="menu-card" style="min-width: 40%;">🎬<br>Movies</button>
                <button id="navSong" class="menu-card" style="min-width: 40%;">🎵<br>Songs</button>
                <button id="navBook" class="menu-card" style="min-width: 40%;">📚<br>Books</button>
                <button id="navTravel" class="menu-card" style="min-width: 40%;">✈️<br>Travel</button>
            </div>
        </div>

        <div id="movieView" class="view">
            <div class="input-form">
                <div style="position: relative; display: flex; gap: 8px;">
                    <input type="text" id="movieTitle" placeholder="Movie Title (Required)" style="margin-bottom: 0; flex: 1;" autocomplete="off">
                    <button id="openPasteModalBtn" class="icon-btn" style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 4px; padding: 0 12px; font-size: 20px;" title="Paste Movie List">📁</button>
                    <div id="movieSuggestions" class="suggestions-box"></div>
                </div>
                <div class="row-inputs">
                    <select id="movieType" class="dynamic-dropdown">
                        <option value="Movie">Movie</option><option value="Shortfilm">Shortfilm</option>
                        <option value="Series">Series</option><option value="Documentary">Documentary</option>
                        <option value="Docu-Series">Docu-Series</option>
                    </select>
                    <select id="movieLang" class="dynamic-dropdown"><option value="" disabled>Select Language</option></select>
                </div>
                <div class="row-inputs">
                    <select id="movieYear" class="dynamic-dropdown"></select>
                    <select id="movieGenre" class="dynamic-dropdown"><option value="" disabled selected>Select Genre</option></select>
                </div>
                
                <div class="compact-row">
                    <div class="input-group shrink">
                        <label for="movieStatus" class="input-label">Status:</label>
                        <select id="movieStatus">
                            <option value="watched">Watched</option>
                            <option value="to_watch">To Watch</option>
                        </select>
                    </div>
                    <div class="input-group shrink">
                        <label for="movieDate" class="input-label">Date:</label>
                        <input type="date" id="movieDate">
                    </div>
                    <div class="input-group shrink">
                        <label for="movieRating" class="input-label">Rating:</label>
                        <select id="movieRating">
                            <option value="NA" selected>NA</option>
                            <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option>
                            <option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option>
                            <option value="9">9</option><option value="10">10</option>
                        </select>
                    </div>
                </div>

                <textarea id="movieNotes" rows="3" placeholder="Add your notes or review here..."></textarea>
                <button id="saveMovieBtn" class="save-btn">Update</button>
            </div>
            
            <div class="list-container">
                <div class="heading-row">
                    <h3 id="movieListHeading" style="margin:0;">Database</h3>
                    <button class="temp-discard-btn">Discard All</button>
                </div>
                <div class="list-controls">
                    <div class="search-sort-row">
                        <input type="text" id="movieSearch" class="search-bar" placeholder="Search...">
                        <button id="movieViewSwitchBtn" class="sort-icon-btn" title="Switch View">▦</button>
                        <button id="movieSortBtn" class="sort-icon-btn" title="Sort List">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="4" y1="6" x2="16" y2="6"></line><line x1="4" y1="12" x2="12" y2="12"></line><line x1="4" y1="18" x2="8" y2="18"></line><path d="M16 14l3 3l3-3"></path><line x1="19" y1="6" x2="19" y2="17"></line></svg>
                        </button>
                    </div>
                    
                    <select id="movieStatusFilter">
                        <option value="watched">Watched</option>
                        <option value="to_watch">To Watch</option>
                        <option value="all">All Status</option>
                    </select>
                    <select id="movieFilterMain">
                        <option value="">Filter By...</option>
                        <option value="genre">Genre</option>
                        <option value="lang">Language</option>
                        <option value="year">Year</option>
                        <option value="watchedYear">Watched Year</option>
                        <option value="watchedMonth">Watched Month</option>
                    </select>
                    <select id="movieFilterSub" disabled><option value="">Subfilter</option></select>
                </div>

                <table id="movieListTable">
                    <thead><tr><th style="width: 30px;">SL</th><th>Title</th><th style="width: 40px;">Del</th></tr></thead>
                    <tbody id="movieList"></tbody>
                </table>

                <div id="movieGridView" class="icon-grid-view"></div>

            </div>
        </div>

        <div id="songView" class="view">...</div>
        <div id="bookView" class="view">...</div>
        <div id="travelView" class="view">...</div>
    </div>

    <div id="detailsModal" class="modal">...</div>
    <div id="pasteModal" class="modal">...</div>
    <div id="sortModal" class="modal">...</div>

    <script type="module" src="app.js"></script>
</body>
</html>
