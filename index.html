<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShelf | Movie Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body data-theme="default">

  <div id="login-wrapper">
    <h1 class="login-title">MyShelf</h1>
    <div class="login-form">
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-password" placeholder="Password">
      <button id="login-btn">Login</button>
    </div>
  </div>

  <div id="app-wrapper" class="hidden">
    
    <div id="sidebar" class="sidebar">
      <button id="close-sidebar" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
      <h2>Settings</h2>
      
      <div class="sidebar-section">
        <select id="theme-select">
          <option value="default">Modern Light (Default)</option>
          <option value="dark-knight">Dark Knight</option>
          <option value="spider-man">Spider-Man</option>
          <option value="mad-max">Mad Max: Fury Road</option>
          <option value="grand-budapest">The Grand Budapest Hotel</option>
          <option value="moonlight">Moonlight</option>
          <option value="matrix">The Matrix</option>
          <option value="blade-runner">Blade Runner 2049</option>
          <option value="interstellar">Interstellar</option>
          <option value="joker">Joker (2019)</option>
          <option value="dune">Dune</option>
        </select>
      </div>

      <div class="sidebar-section">
        <h3>Customize</h3>
        <select id="customize-prop-select">
          <option value="Property">Properties</option>
        </select>
        <input type="text" id="customize-tag-input" placeholder="Tag / String Input">
        <div style="display: flex; justify-content: flex-end;">
          <button id="add-custom-btn" class="btn btn-primary" style="width: auto; padding: 10px 20px;">Add</button>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>Database Control</h3>
        <select id="db-select">
          <option value="commits">Commits</option>
          <option value="database">Database</option>
        </select>
        
        <div class="row-group" style="margin-top: 10px; margin-bottom: 0;">
          <button id="view-btn" class="btn btn-outline sidebar-db-btn">View</button>
          <button id="compare-btn" class="btn btn-outline sidebar-db-btn">Compare</button>
          <button id="merge-btn" class="btn btn-outline sidebar-db-btn">Merge</button>
          <button id="export-btn" class="btn btn-outline sidebar-db-btn hidden">Export</button>
        </div>
      </div>
      
      <div class="sidebar-version">V2.5.20</div>
    </div>

    <div id="main-content">
      
      <div class="main-card">
        
        <header class="app-header">
          <div class="header-brand">
            <img src="icon.jpg" alt="App Icon" class="app-icon">
            <h1>MyShelf</h1>
          </div>
        </header>

        <hr class="divider">

        <div class="toolbar">
          <button id="open-sidebar" class="icon-btn"><i class="fa-solid fa-bars"></i></button>
          <button id="home-btn" class="icon-btn square-btn hidden"><i class="fa-solid fa-house house-icon"></i></button>
          <button id="logout-btn" class="icon-btn square-btn hidden" title="Logout"><i class="fa-solid fa-right-from-bracket" style="color: #E11D48;"></i></button>
        </div>

        <div class="container">
          
          <section id="landing-panel" class="panel hidden">
            <div class="grid-2x2">
              <button id="nav-movies" class="grid-btn"><span class="icon">🎬</span>Movies</button>
              <button id="nav-songs" class="grid-btn"><span class="icon">🎵</span>Songs</button>
              <button id="nav-books" class="grid-btn"><span class="icon">📚</span>Books</button>
              <button id="nav-travel" class="grid-btn" style="background-color: rgba(0,0,0,0.04);"><span class="icon">✈️</span>Travel</button>
            </div>
          </section>

          <section id="input-panel" class="panel hidden">
            <div class="row-group" style="align-items: center;">
              <input type="text" id="movie-name" placeholder="Title" style="flex: 1;">
              <button id="open-bulk-btn" class="btn btn-outline icon-only-btn" title="Open Note Box" style="height: 48px; width: 48px; flex-shrink: 0;">
                <i class="fa-solid fa-file"></i>
              </button>
            </div>
            
            <div class="row-group">
              <select id="add-prop-select" class="half-width">
                <option value="">Properties</option>
              </select>
              <select id="add-tag-select" class="half-width" disabled>
                <option value="">Tag</option>
              </select>
            </div>

            <div class="form-group full-width">
              <textarea id="movie-notes" rows="3" placeholder="Notes"></textarea>
            </div>

            <div style="display: flex; justify-content: flex-end;">
              <button id="save-movie-btn" class="btn btn-primary" style="width: auto;">Save</button>
            </div>
          </section>

          <div id="shared-filter-bar" class="filter-bar hidden">
            <div class="filter-row">
              <div class="filter-group">
                <select id="filter-by-select">
                  <option value="">Filter By</option>
                </select>
              </div>
              <div class="filter-group">
                <select id="filter-tag-select" disabled>
                  <option value="">Select Tag</option>
                </select>
              </div>
            </div>
            
            <div class="filter-actions">
              <button id="clear-filters-btn" class="btn btn-outline icon-only-btn" title="Clear Filters">
                <i class="fa-solid fa-filter-circle-xmark"></i>
              </button>
              <button id="discard-all-btn" class="btn btn-danger hidden" title="Discard All Temporary Movies">Discard All</button>
              <button id="delete-drafts-btn" class="btn btn-danger icon-only-btn hidden" title="Delete Selected">
                <i class="fa-solid fa-trash"></i>
              </button>
            </div>
          </div>

          <section id="commits-panel" class="panel hidden">
            <div class="table-wrapper">
              <table id="commits-table">
                <thead>
                  <tr><th>SL.</th><th>Title</th><th></th></tr>
                </thead>
                <tbody id="commits-body"></tbody>
              </table>
            </div>
          </section>

          <section id="database-panel" class="panel hidden">
            <div class="table-wrapper">
              <table id="movie-table">
                <thead>
                  <tr><th>SL.</th><th>Title</th><th></th></tr>
                </thead>
                <tbody id="table-body"></tbody>
              </table>
            </div>
          </section>

          <section id="compare-panel" class="panel hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
              <h3 style="font-size: 1.1rem; color: var(--text);">Overlapping Movies</h3>
              <button id="overlap-btn" class="btn btn-primary" style="width: auto;">Overlap</button>
            </div>
            <div class="table-wrapper">
              <table id="compare-table">
                <thead>
                  <tr><th>Property</th><th>Main DB</th><th>Temp DB</th></tr>
                </thead>
                <tbody id="compare-body"></tbody>
              </table>
            </div>
          </section>

        </div>
      </div>
    </div>
  </div>

  <div id="bulk-modal" class="modal hidden">
    <div class="modal-content main-card">
      <span id="close-bulk-modal" class="close-modal">&times;</span>
      <h2 style="margin-bottom: 10px;">Bulk Import Notes</h2>
      
      <div class="form-group full-width" style="margin-bottom: 10px;">
        <label>Extraction Format</label>
        <input type="text" id="bulk-format-input" value="{Title}({Year})({Language})">
        <small style="font-size: 0.75rem; color: var(--muted); margin-top: 5px; opacity: 0.8;">Use {Title} and {Property_Name} tags to map values.</small>
      </div>
      
      <div class="form-group full-width">
        <textarea id="bulk-input-text" rows="8" placeholder="Movie1(2023)(English)&#10;Movie2(2021)(Spanish)"></textarea>
      </div>

      <div style="display: flex; justify-content: center; margin-top: 10px;">
        <button id="bulk-save-btn" class="btn btn-primary" style="width: auto;">Save</button>
      </div>
    </div>
  </div>

  <div id="details-modal" class="modal hidden">
    <div class="modal-content main-card">
      <span id="close-modal" class="close-modal">&times;</span>
      
      <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
        <i id="modal-edit-toggle" class="fa-solid fa-pen-slash icon-btn hidden" title="Toggle Edit"></i>
        <h2 id="modal-heading" style="margin-bottom: 0; padding-right: 0;">Movie Details</h2>
      </div>
      
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="modal-title-input">
      </div>
      
      <div id="modal-dynamic-props" class="dynamic-grid">
      </div>
      
      <div class="form-group full-width">
        <label>Notes</label>
        <textarea id="modal-notes-input" rows="3"></textarea>
      </div>

      <div id="modal-actions" class="hidden" style="display: flex; justify-content: center; gap: 15px; margin-top: 20px;">
        <button id="modal-edit-btn" class="btn btn-outline" style="width: auto;">Edit</button>
        <button id="modal-update-btn" class="btn btn-primary" style="width: auto;" disabled>Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
