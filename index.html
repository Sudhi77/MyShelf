<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShelf | Movie Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body data-theme="default">

  <div id="login-wrapper">
    <h1 class="login-title">MyShelf</h1>
    <div class="login-form">
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-password" placeholder="Password">
      <button id="login-btn">Login</button>
    </div>
  </div>

  <div id="app-wrapper" class="hidden">
    
    <div id="sidebar" class="sidebar">
      <button id="close-sidebar" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
      <h2>Settings</h2>
      
      <div class="sidebar-section">
        <select id="theme-select">
          <option value="default">✨ Modern Light (Default)</option>
          <option value="dark-knight">🦇 Dark Knight</option>
          <option value="spider-man">🕷️ Spider-Man</option>
          <option value="mad-max">🏜️ Mad Max: Fury Road</option>
          <option value="grand-budapest">🏨 The Grand Budapest Hotel</option>
          <option value="moonlight">🌊 Moonlight</option>
          <option value="matrix">💻 The Matrix</option>
          <option value="blade-runner">🏎️ Blade Runner 2049</option>
          <option value="interstellar">🌌 Interstellar</option>
          <option value="joker">🤡 Joker (2019)</option>
          <option value="dune">🏜️ Dune</option>
        </select>
      </div>

      <div class="sidebar-section">
        <h3>Customize</h3>
        
        <select id="customize-prop-select">
          <option value="Property">Property (Add New)</option>
        </select>
        
        <input type="text" id="customize-tag-input" placeholder="Tag / String Input">
        
        <button id="add-custom-btn" class="btn btn-primary">Add</button>
      </div>

      <div class="sidebar-section">
        <button id="db-view-btn" class="btn btn-outline">Database View</button>
      </div>
    </div>

    <div id="main-content">
      
      <div class="main-card">
        
        <header class="app-header">
          <div class="header-brand">
            <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=100&h=100&fit=crop" alt="Profile" class="profile-pic">
            <h1>MyShelf</h1>
          </div>
          <button id="logout-btn" class="icon-btn" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
        </header>

        <hr class="divider">

        <div class="toolbar">
          <button id="open-sidebar" class="icon-btn"><i class="fa-solid fa-bars"></i></button>
          <button id="home-btn" class="icon-btn square-btn"><i class="fa-solid fa-house house-icon"></i></button>
        </div>

        <div class="container">
          <section id="input-panel" class="panel">
            
            <div class="form-group">
              <input type="text" id="movie-name" placeholder="Title">
            </div>
            
            <div class="row-group">
              <select id="add-prop-select" class="half-width">
                <option value="">Select Property</option>
                </select>
              
              <select id="add-tag-select" class="half-width" disabled>
                <option value="">Select Value</option>
                </select>
            </div>

            <div class="form-group full-width">
              <textarea id="movie-notes" rows="3" placeholder="Notes (Review/Info)"></textarea>
            </div>

            <button id="save-movie-btn" class="btn btn-primary">Save Movie</button>
          </section>

          <section id="database-panel" class="panel hidden">
            
            <div class="filter-bar">
              <div class="filter-group">
                <select id="filter-by-select">
                  <option value="">Filter By</option>
                </select>
              </div>
              <div class="filter-group">
                <select id="filter-tag-select" disabled>
                  <option value="">Select Tag</option>
                </select>
              </div>
            </div>

            <div class="table-wrapper">
              <table id="movie-table">
                <thead id="table-head">
                </thead>
                <tbody id="table-body">
                </tbody>
              </table>
            </div>
          </section>

        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
